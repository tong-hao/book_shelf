name: Build & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            bundle-targets: deb
            artifact-name: BookShelf-Linux-x86_64
          - os: macos-latest
            bundle-targets: dmg
            artifact-name: BookShelf-macOS-x86_64
          - os: windows-latest
            bundle-targets: msi
            artifact-name: BookShelf-Windows-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ==================== 工具链安装 ====================

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Cache pnpm
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      # ==================== 系统依赖（Linux） ====================

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      # ==================== 前端构建 ====================

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # ==================== Tauri 构建 ====================

      - name: Build (macOS)
        if: matrix.os == 'macos-latest'
        run: pnpm tauri build --bundles ${{ matrix.bundle-targets }}
        env:
          # GitHub Actions 的 macOS runner 无法签名，跳过以正常打包
          APPLE_CERTIFICATE: ""
          APPLE_CERTIFICATE_PASSWORD: ""
          APPLE_SIGNING_IDENTITY: ""
          APPLE_TEAM_ID: ""
          APPLE_ID: ""
          APPLE_PASSWORD: ""
          APPLE_API_KEY_ID: ""
          APPLE_API_ISSUER: ""

      - name: Build (Linux / Windows)
        if: matrix.os != 'macos-latest'
        run: pnpm tauri build --bundles ${{ matrix.bundle-targets }}

      # ==================== 上传产物 ====================

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            src-tauri/target/release/bundle/${{ matrix.bundle-targets }}/*
            !src-tauri/target/release/bundle/${{ matrix.bundle-targets }}/.gitkeep
          if-no-files-found: error
          compression-level: 0
