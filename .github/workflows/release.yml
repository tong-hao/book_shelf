name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            bundle-targets: deb
            artifact-name: BookShelf-Linux-x86_64
          - os: macos-latest
            bundle-targets: dmg
            artifact-name: BookShelf-macOS-arm64
          - os: windows-latest
            bundle-targets: nsis
            artifact-name: BookShelf-Windows-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Cache pnpm
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install frontend dependencies
        run: |
          pnpm install --frozen-lockfile || true
          pnpm approve-builds --all
          pnpm install --frozen-lockfile
        env:
          PNPM_MINIMUM_RELEASE_AGE: "0"

      - name: Generate icons (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          python -m pip install Pillow
          python -c "
          from PIL import Image
          img = Image.open('src-tauri/icons/icon.png')
          img.save('src-tauri/icons/icon.ico', format='ICO', sizes=[(256,256),(128,128),(64,64),(48,48),(32,32),(16,16)])
          "
          Write-Host "icon.ico generated successfully"

      - name: Build (macOS)
        if: matrix.os == 'macos-latest'
        run: pnpm tauri build --bundles ${{ matrix.bundle-targets }}

      - name: Build (Linux / Windows)
        if: matrix.os != 'macos-latest'
        run: pnpm tauri build --bundles ${{ matrix.bundle-targets }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            src-tauri/target/release/bundle/${{ matrix.bundle-targets }}/*
            !src-tauri/target/release/bundle/${{ matrix.bundle-targets }}/.gitkeep
          if-no-files-found: error
          compression-level: 0

  create-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: ls -lh release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: "${{ github.ref_name }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: release-assets/*
